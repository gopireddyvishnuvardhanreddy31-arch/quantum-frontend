<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Security</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔐 Quantum Secure Communication</h1>

    <!-- AUTH -->
    <div class="section">
        <h2>Authentication</h2>
        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <br>
        <button onclick="auth('signup')">Signup</button>
        <button onclick="auth('login')">Login</button>
        <p id="authStatus"></p>
    </div>

    <!-- KEY -->
    <div class="section">
        <h2>Quantum Key</h2>
        <button onclick="genKey()">Generate Key</button>
        <p id="status"></p>
    </div>

    <!-- MESSAGE -->
    <div class="section">
        <h2>Encrypt / Decrypt</h2>
        <input id="message" type="text" placeholder="Enter message">
        <br>
        <button onclick="process('encrypt')">Encrypt</button>
        <button onclick="process('decrypt')">Decrypt</button>
        <p id="output"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
